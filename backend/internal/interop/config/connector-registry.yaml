version: 2
policy_mode: fail_closed
default_status: blocked

connectors:
  - connector_id: public_site_metadata
    status: active
    owner_team: audit_platform
    source_type: public_web
    transport: runtime_http_fetch
    authentication: none
    tenant_isolation: request_scope
    read_only: true
    allowed_action_classes:
      - inspect_public_site
    required_runtime_class: read_only_fetch
    require_policy_decision: true
    require_provenance: true
    require_taint_scan: true
    max_response_bytes: 2097152
    timeout_ms: 15000
    redirects_allowed: false
